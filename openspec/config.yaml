schema: spec-driven

context: |
  Project: Portuguese Food & Wine Guide — LLM Zoomcamp 2026 final project.
  Tech stack: Python 3.14, Flask, OpenAI (GPT-4o), Qdrant (vector DB), PostgreSQL, Grafana, Docker Compose.
  Search: hybrid dense+sparse with cross-encoder re-ranking and query rewriting.
  Embeddings: intfloat/multilingual-e5-small.
  Re-ranker: cross-encoder/ms-marco-MiniLM-L-6-v2.
  Lang: PT-PT data (European Portuguese), English README.
  Package manager: uv (pip compatible pyproject.toml).
  API pattern: Flask with factory function create_app().
  DB init: docker/init-db.sql auto-runs in postgres container.
  Monitoring: Grafana with PostgreSQL data source.
  Cloud: DigitalOcean VM, same docker-compose, Caddy for HTTPS via COMPOSE_PROFILES=cloud.
  Data sources: Wikipedia PT/EN (API), Infovini (scraper), MDPI recipe dataset (if accessible).
